<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>psycho-social math — XQ</title>
  <meta name="description" content="A mathematics reflected in psychosocial reality. Twenty slides on the core arc — foundations, triangle, n-points, layers, A·B·C state, catch-22, dyadic lattice, recursion, reflexive reading.">
  <link rel="icon" href="/assets/torus.png" type="image/png">

  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    html, body { background: #fbf8f1; }
    body { margin: 0; }
    .back-link {
      position: fixed;
      top: 1rem;
      left: 1.25rem;
      z-index: 50;
      font-family: "Iowan Old Style", "Palatino", "Times New Roman", serif;
      font-style: italic;
      font-size: 0.8rem;
      color: #9a9085;
      text-decoration: none;
      letter-spacing: 0.05em;
    }
    .back-link:hover { color: #1f1a13; }
  </style>
</head>
<body>
  <a href="/experiments" class="back-link">&larr; experiments</a>
  <div id="root"></div>

  <script type="text/babel" data-presets="react">
    const { useState, useEffect } = React;

    const C = {
      bg: '#fbf8f1',
      surface: '#fefcf6',
      text: '#1f1a13',
      textSecondary: '#5d544a',
      textTertiary: '#9a9085',
      border: '#e8dec8',
      borderSoft: '#f0e8d4',
      accent:  '#b8602d',
      acute:   '#5b7a3a',
      right:   '#b8722e',
      obtuse:  '#9a4858',
      blue:    '#4a5d78',
      teal:    '#2d8a8a',
    };

    const fontSerif = '"Iowan Old Style", "Palatino", "Times New Roman", serif';

    const SlideBase = ({ children, kicker, footnote }) => (
      <div style={{
        minHeight: '100vh',
        display: 'flex',
        flexDirection: 'column',
        justifyContent: 'center',
        alignItems: 'center',
        padding: '110px 48px 100px',
        fontFamily: fontSerif,
        color: C.text,
        position: 'relative',
      }}>
        {kicker && (
          <div style={{
            position: 'absolute', top: 76, left: 48,
            fontSize: 11, letterSpacing: '0.32em', textTransform: 'uppercase',
            color: C.textTertiary, fontFamily: fontSerif,
          }}>
            {kicker}
          </div>
        )}
        <div style={{
          maxWidth: 880, width: '100%', textAlign: 'center',
        }}>
          {children}
        </div>
        {footnote && (
          <div style={{
            position: 'absolute', bottom: 32, left: 48, right: 48,
            textAlign: 'center', fontSize: 11, fontStyle: 'italic',
            color: C.textTertiary, fontFamily: fontSerif,
          }}>
            {footnote}
          </div>
        )}
      </div>
    );

    const slides = [

      // ============ SLIDE 1 · OPENING (retitled) ============
      () => (
        <SlideBase>
          <div style={{
            fontSize: 11, letterSpacing: '0.4em', textTransform: 'uppercase',
            color: C.textTertiary, marginBottom: 28,
          }}>
            xq · the core arc
          </div>
          <h1 style={{
            fontSize: '3.4rem', fontWeight: 300, fontStyle: 'italic',
            color: C.text, margin: '0 0 32px', lineHeight: 1.15,
          }}>
            Psycho-social Math
          </h1>
          <p style={{
            fontSize: '1.15rem', fontStyle: 'italic',
            color: C.textSecondary, lineHeight: 1.7, maxWidth: 640,
            margin: '0 auto',
          }}>
            A mathematics reflected in psychosocial reality.<br />
            Not applied to · reflected in.<br />
            The maths is a structured surface · the user is a reader · the reading is the event.
          </p>
          <p style={{
            marginTop: 56, fontSize: '0.95rem', color: C.textTertiary,
            fontStyle: 'italic',
          }}>
            twenty slides · the whole arc at altitude
          </p>
        </SlideBase>
      ),

      // ============ PART 1 · FOUNDATIONS ============

      () => (
        <SlideBase kicker="part 1 · foundations">
          <p style={{
            fontSize: 11, letterSpacing: '0.3em', textTransform: 'uppercase',
            color: C.acute, marginBottom: 24,
          }}>
            the move
          </p>
          <h2 style={{
            fontSize: '2.4rem', fontWeight: 300, fontStyle: 'italic',
            color: C.text, margin: '0 0 28px', lineHeight: 1.3,
          }}>
            Two constructions of dimensionality.
          </h2>
          <p style={{
            fontSize: '1.1rem', color: C.textSecondary, lineHeight: 1.7,
            maxWidth: 620, margin: '0 auto',
          }}>
            How a line comes to exist determines what the line is for.<br />
            Either two-points-given (relational) or one-point-with-opposing-directions (centred).
          </p>
          <p style={{
            marginTop: 32, fontSize: '0.95rem', color: C.textTertiary,
            fontStyle: 'italic',
          }}>
            and a third — emergence from substrate.
          </p>
        </SlideBase>
      ),

      () => (
        <SlideBase kicker="part 1 · structure · two intervals">
          <p style={{
            fontSize: '1.4rem', color: C.textSecondary, fontStyle: 'italic',
            margin: '0 0 56px',
          }}>
            Each construction implies an interval.
          </p>
          <div style={{ display: 'flex', justifyContent: 'center', gap: 80, flexWrap: 'wrap' }}>
            <div style={{ textAlign: 'center' }}>
              <svg viewBox="0 0 240 60" width="240" height="60">
                <line x1="30" y1="30" x2="210" y2="30" stroke={C.acute} strokeWidth="2" />
                <circle cx="30" cy="30" r="6" fill={C.acute} />
                <circle cx="210" cy="30" r="6" fill={C.acute} />
                <text x="30" y="55" textAnchor="middle" fontSize="12" fontStyle="italic" fill={C.text} fontFamily={fontSerif}>0</text>
                <text x="210" y="55" textAnchor="middle" fontSize="12" fontStyle="italic" fill={C.text} fontFamily={fontSerif}>1</text>
              </svg>
              <p style={{ marginTop: 12, fontSize: '1rem', fontStyle: 'italic', color: C.acute }}>[ 0 , 1 ]</p>
              <p style={{ marginTop: 4, fontSize: 12, color: C.textTertiary, fontStyle: 'italic' }}>
                relational · multiplicative<br />mutual presence
              </p>
            </div>
            <div style={{ textAlign: 'center' }}>
              <svg viewBox="0 0 240 60" width="240" height="60">
                <line x1="30" y1="30" x2="210" y2="30" stroke={C.obtuse} strokeWidth="2" />
                <circle cx="30" cy="30" r="6" fill={C.obtuse} />
                <circle cx="120" cy="30" r="4" fill={C.obtuse} />
                <circle cx="210" cy="30" r="6" fill={C.obtuse} />
                <text x="30" y="55" textAnchor="middle" fontSize="12" fontStyle="italic" fill={C.text} fontFamily={fontSerif}>−1</text>
                <text x="120" y="55" textAnchor="middle" fontSize="12" fontStyle="italic" fill={C.text} fontFamily={fontSerif}>0</text>
                <text x="210" y="55" textAnchor="middle" fontSize="12" fontStyle="italic" fill={C.text} fontFamily={fontSerif}>+1</text>
              </svg>
              <p style={{ marginTop: 12, fontSize: '1rem', fontStyle: 'italic', color: C.obtuse }}>[ −1 , +1 ]</p>
              <p style={{ marginTop: 4, fontSize: 12, color: C.textTertiary, fontStyle: 'italic' }}>
                oppositional · signed<br />axis through a centre
              </p>
            </div>
          </div>
        </SlideBase>
      ),

      // ============ PART 2 · TRIANGLE ============

      () => (
        <SlideBase kicker="part 2 · the triangle">
          <p style={{
            fontSize: 11, letterSpacing: '0.3em', textTransform: 'uppercase',
            color: C.right, marginBottom: 24,
          }}>
            the move
          </p>
          <h2 style={{
            fontSize: '2.4rem', fontWeight: 300, fontStyle: 'italic',
            color: C.text, margin: '0 0 28px', lineHeight: 1.3,
          }}>
            Three points · three centres.
          </h2>
          <p style={{
            fontSize: '1.1rem', color: C.textSecondary, lineHeight: 1.7,
            maxWidth: 620, margin: '0 auto',
          }}>
            Where two points have one midpoint, three points have three distinct centres.<br />
            Each precise · each useful for a different reading.
          </p>
        </SlideBase>
      ),

      () => (
        <SlideBase kicker="part 2 · structure · trichotomy and movement">
          <p style={{
            fontSize: '1.1rem', color: C.textSecondary, fontStyle: 'italic',
            margin: '0 0 32px',
          }}>
            Three triangles · three regimes · one boundary.
          </p>
          <div style={{ display: 'flex', justifyContent: 'center', gap: 32, marginBottom: 36, flexWrap: 'wrap' }}>
            <div style={{ textAlign: 'center' }}>
              <svg viewBox="0 0 120 120" width="100" height="100">
                <polygon points="20,100 100,100 60,30"
                  fill={C.acute} fillOpacity="0.14" stroke={C.acute} strokeWidth="1.5" />
                <circle cx="60" cy="76.67" r="3" fill={C.acute} />
                <circle cx="60" cy="71" r="2.5" fill={C.right} />
                <circle cx="60" cy="65" r="2.5" fill={C.obtuse} />
              </svg>
              <p style={{ marginTop: 8, fontSize: 13, fontStyle: 'italic', color: C.acute }}>acute</p>
              <p style={{ marginTop: 2, fontSize: 10, color: C.textTertiary, fontStyle: 'italic' }}>centres inside</p>
            </div>
            <div style={{ textAlign: 'center' }}>
              <svg viewBox="0 0 120 120" width="100" height="100">
                <polygon points="20,100 100,100 20,30"
                  fill={C.right} fillOpacity="0.14" stroke={C.right} strokeWidth="1.5" />
                <polyline points="20,90 30,90 30,100" fill="none" stroke={C.right} strokeWidth="0.8" />
                <circle cx="46.67" cy="76.67" r="3" fill={C.acute} />
                <circle cx="60" cy="65" r="2.5" fill={C.right} />
                <circle cx="20" cy="100" r="3" fill={C.obtuse} />
              </svg>
              <p style={{ marginTop: 8, fontSize: 13, fontStyle: 'italic', color: C.right }}>right</p>
              <p style={{ marginTop: 2, fontSize: 10, color: C.textTertiary, fontStyle: 'italic' }}>separatrix</p>
            </div>
            <div style={{ textAlign: 'center' }}>
              <svg viewBox="0 0 140 120" width="120" height="100">
                <polygon points="20,90 120,90 50,75"
                  fill={C.obtuse} fillOpacity="0.14" stroke={C.obtuse} strokeWidth="1.5" />
                <circle cx="63.33" cy="85" r="3" fill={C.acute} />
                <circle cx="70" cy="110" r="2.5" fill={C.right} />
                <circle cx="80" cy="60" r="2.5" fill={C.obtuse} />
              </svg>
              <p style={{ marginTop: 8, fontSize: 13, fontStyle: 'italic', color: C.obtuse }}>obtuse</p>
              <p style={{ marginTop: 2, fontSize: 10, color: C.textTertiary, fontStyle: 'italic' }}>O escapes</p>
            </div>
          </div>
          <p style={{
            fontSize: '0.98rem', color: C.textSecondary, lineHeight: 1.7,
            maxWidth: 600, margin: '0 auto', fontStyle: 'italic',
          }}>
            When the actual centre G and the implied centre O come apart · the configuration is oriented outward.<br />
            <span style={{ color: C.textTertiary, fontSize: '0.9rem' }}>
              G → O is movement. Pythagoras lives on the boundary.
            </span>
          </p>
          <a
            href="https://claude.ai/public/artifacts/3c3299ee-eacc-4d06-95dd-5d7ab8b5e299"
            target="_blank"
            rel="noopener noreferrer"
            style={{
              display: 'inline-block',
              marginTop: 24,
              padding: '8px 18px',
              border: `1px solid ${C.right}`,
              color: C.right,
              textDecoration: 'none',
              borderRadius: 3,
              fontSize: 12,
              fontStyle: 'italic',
              letterSpacing: '0.06em',
              fontFamily: fontSerif,
              transition: 'all 0.2s',
            }}
            onMouseEnter={(e) => {
              e.currentTarget.style.backgroundColor = C.right;
              e.currentTarget.style.color = '#fff';
            }}
            onMouseLeave={(e) => {
              e.currentTarget.style.backgroundColor = 'transparent';
              e.currentTarget.style.color = C.right;
            }}
          >
            live triangle &nbsp;↗
          </a>
        </SlideBase>
      ),

      // ============ PART 3 · n / EULER ============

      () => (
        <SlideBase kicker="part 3 · n points">
          <p style={{
            fontSize: 11, letterSpacing: '0.3em', textTransform: 'uppercase',
            color: C.blue, marginBottom: 24,
          }}>
            the move
          </p>
          <h2 style={{
            fontSize: '2.4rem', fontWeight: 300, fontStyle: 'italic',
            color: C.text, margin: '0 0 28px', lineHeight: 1.3,
          }}>
            From 1<sup style={{ fontSize: '1.5rem' }}>n</sup> into complex coordinates.
          </h2>
          <p style={{
            fontSize: '1.1rem', color: C.textSecondary, lineHeight: 1.7,
            maxWidth: 640, margin: '0 auto',
          }}>
            The n-th roots of unity · z<sup>n</sup> = 1.<br />
            n points equidistant on the unit circle. The canonical non-centralised configuration.
          </p>
          <p style={{
            marginTop: 24, fontSize: '0.95rem', color: C.textTertiary,
            fontStyle: 'italic', maxWidth: 580, margin: '24px auto 0', lineHeight: 1.6,
          }}>
            King Arthur's round table, formalised.
          </p>
        </SlideBase>
      ),

      () => (
        <SlideBase kicker="part 3 · structure · euler, phase, roots">
          <div style={{ display: 'flex', justifyContent: 'center', gap: 48, alignItems: 'center', flexWrap: 'wrap' }}>
            <div style={{ textAlign: 'center' }}>
              <svg viewBox="0 0 240 240" width="220" height="220">
                <circle cx="120" cy="120" r="85"
                  fill="none" stroke={C.blue} strokeWidth="1" opacity="0.5" />
                <line x1="20" y1="120" x2="220" y2="120" stroke={C.border} strokeWidth="0.6" />
                <line x1="120" y1="20" x2="120" y2="220" stroke={C.border} strokeWidth="0.6" />
                <text x="222" y="135" fontSize="11" fontStyle="italic" fill={C.textTertiary} fontFamily={fontSerif}>Re</text>
                <text x="126" y="22" fontSize="11" fontStyle="italic" fill={C.textTertiary} fontFamily={fontSerif}>i</text>
                {(() => {
                  const theta = Math.PI / 3;
                  const px = 120 + 85 * Math.cos(theta);
                  const py = 120 - 85 * Math.sin(theta);
                  return (
                    <g>
                      <line x1="120" y1="120" x2={px} y2={py} stroke={C.blue} strokeWidth="1.2" />
                      <path d={`M 140 120 A 20 20 0 0 0 ${120 + 20 * Math.cos(theta)} ${120 - 20 * Math.sin(theta)}`}
                        fill="none" stroke={C.blue} strokeWidth="0.8" opacity="0.7" />
                      <text x="146" y="115" fontSize="11" fontStyle="italic" fill={C.blue} fontFamily={fontSerif}>θ</text>
                      <circle cx={px} cy={py} r="5" fill={C.blue} />
                      <text x={px + 8} y={py - 5} fontSize="11" fontStyle="italic" fill={C.text} fontFamily={fontSerif}>
                        e<tspan baselineShift="super" fontSize="9">iθ</tspan>
                      </text>
                      <line x1={px} y1={py} x2={px} y2={120}
                        stroke={C.textTertiary} strokeWidth="0.5" strokeDasharray="2 2" />
                      <line x1={px} y1={py} x2={120} y2={py}
                        stroke={C.textTertiary} strokeWidth="0.5" strokeDasharray="2 2" />
                      <text x={px} y={138} textAnchor="middle" fontSize="10" fontStyle="italic" fill={C.textTertiary} fontFamily={fontSerif}>cos θ</text>
                      <text x={112} y={py + 4} textAnchor="end" fontSize="10" fontStyle="italic" fill={C.textTertiary} fontFamily={fontSerif}>sin θ</text>
                    </g>
                  );
                })()}
                <circle cx="120" cy="120" r="2" fill={C.text} />
              </svg>
              <p style={{ marginTop: 8, fontSize: 13, fontStyle: 'italic', color: C.blue }}>
                phase · e<sup>iθ</sup>
              </p>
            </div>

            <div style={{ textAlign: 'center' }}>
              <svg viewBox="0 0 240 240" width="220" height="220">
                <circle cx="120" cy="120" r="85"
                  fill="none" stroke={C.blue} strokeWidth="1" opacity="0.5" />
                <line x1="20" y1="120" x2="220" y2="120" stroke={C.border} strokeWidth="0.6" />
                <line x1="120" y1="20" x2="120" y2="220" stroke={C.border} strokeWidth="0.6" />
                {(() => {
                  const n = 5;
                  const r = 85;
                  const points = Array.from({ length: n }, (_, k) => {
                    const angle = (2 * Math.PI * k) / n;
                    return {
                      x: 120 + r * Math.cos(angle),
                      y: 120 - r * Math.sin(angle),
                    };
                  });
                  const pathStr = points.map((p, i) => `${i === 0 ? 'M' : 'L'} ${p.x} ${p.y}`).join(' ') + ' Z';
                  return (
                    <g>
                      <path d={pathStr} fill={C.blue} fillOpacity="0.04"
                        stroke={C.blue} strokeWidth="0.8" opacity="0.5" />
                      {points.map((p, i) => (
                        <g key={i}>
                          <line x1="120" y1="120" x2={p.x} y2={p.y}
                            stroke={C.blue} strokeWidth="0.5" opacity="0.4" />
                          <circle cx={p.x} cy={p.y} r="5" fill={C.blue} />
                        </g>
                      ))}
                    </g>
                  );
                })()}
                <circle cx="120" cy="120" r="2" fill={C.text} />
              </svg>
              <p style={{ marginTop: 8, fontSize: 13, fontStyle: 'italic', color: C.blue }}>
                n roots · z<sup>n</sup> = 1
              </p>
            </div>
          </div>
          <p style={{
            fontSize: '1.1rem', color: C.text, lineHeight: 1.7,
            maxWidth: 660, margin: '24px auto 0', fontStyle: 'italic',
          }}>
            e<sup>iθ</sup> = cos θ + i sin θ
          </p>
          <p style={{
            fontSize: '0.95rem', color: C.textSecondary, lineHeight: 1.7,
            maxWidth: 620, margin: '12px auto 0',
          }}>
            Each point of a regular n-gon is a phase.<br />
            <span style={{ color: C.textTertiary, fontStyle: 'italic' }}>
              The same unit circle holds both the moving moment and the standing configuration.
            </span>
          </p>
        </SlideBase>
      ),

      // ============ PART 4 · LAYERS AND REIFICATION ============

      () => (
        <SlideBase kicker="part 4 · layers">
          <p style={{
            fontSize: 11, letterSpacing: '0.3em', textTransform: 'uppercase',
            color: C.obtuse, marginBottom: 24,
          }}>
            the move
          </p>
          <h2 style={{
            fontSize: '2.4rem', fontWeight: 300, fontStyle: 'italic',
            color: C.text, margin: '0 0 28px', lineHeight: 1.3,
          }}>
            Three layers of structure.
          </h2>
          <div style={{
            display: 'flex', flexDirection: 'column', gap: 12,
            maxWidth: 580, margin: '0 auto', textAlign: 'left',
          }}>
            <div style={{ display: 'flex', alignItems: 'flex-start', gap: 16 }}>
              <span style={{ color: C.acute, fontFamily: fontSerif, fontStyle: 'italic',
                fontSize: '1.1rem', minWidth: 32 }}>L0</span>
              <span style={{ color: C.text, fontSize: '1rem', fontStyle: 'italic' }}>
                relational · pairwise distances · no centre needed
              </span>
            </div>
            <div style={{ display: 'flex', alignItems: 'flex-start', gap: 16 }}>
              <span style={{ color: C.right, fontFamily: fontSerif, fontStyle: 'italic',
                fontSize: '1.1rem', minWidth: 32 }}>L1</span>
              <span style={{ color: C.text, fontSize: '1rem', fontStyle: 'italic' }}>
                derived centres · functions of L0 · centroid, circumcentre, others
              </span>
            </div>
            <div style={{ display: 'flex', alignItems: 'flex-start', gap: 16 }}>
              <span style={{ color: C.obtuse, fontFamily: fontSerif, fontStyle: 'italic',
                fontSize: '1.1rem', minWidth: 32 }}>L2</span>
              <span style={{ color: C.text, fontSize: '1rem', fontStyle: 'italic' }}>
                centred · positions from a fixed origin · translation invariance broken
              </span>
            </div>
          </div>
        </SlideBase>
      ),

      () => (
        <SlideBase kicker="part 4 · structure · reification">
          <p style={{
            fontSize: '1.1rem', color: C.textSecondary, fontStyle: 'italic',
            margin: '0 0 36px',
          }}>
            The silent slip.
          </p>
          <svg viewBox="0 0 480 200" width="100%" height="auto" style={{ maxHeight: 220, maxWidth: 500 }}>
            <g>
              <rect x="20" y="40" width="120" height="100" rx="4"
                fill={C.acute} fillOpacity="0.10" stroke={C.acute} strokeWidth="1" />
              <text x="80" y="62" textAnchor="middle" fontSize="12" fontStyle="italic" fill={C.acute} fontFamily={fontSerif}>L0</text>
              <text x="80" y="80" textAnchor="middle" fontSize="10" fill={C.textSecondary} fontFamily={fontSerif}>relational</text>
              <text x="80" y="112" textAnchor="middle" fontSize="9" fontStyle="italic" fill={C.textTertiary} fontFamily={fontSerif}>distances</text>
              <text x="80" y="125" textAnchor="middle" fontSize="9" fontStyle="italic" fill={C.textTertiary} fontFamily={fontSerif}>only</text>

              <text x="160" y="95" textAnchor="middle" fontSize="18" fill={C.acute} fontFamily={fontSerif}>→</text>

              <rect x="180" y="40" width="120" height="100" rx="4"
                fill={C.right} fillOpacity="0.10" stroke={C.right} strokeWidth="1" />
              <text x="240" y="62" textAnchor="middle" fontSize="12" fontStyle="italic" fill={C.right} fontFamily={fontSerif}>L1</text>
              <text x="240" y="80" textAnchor="middle" fontSize="10" fill={C.textSecondary} fontFamily={fontSerif}>derived</text>
              <text x="240" y="112" textAnchor="middle" fontSize="9" fontStyle="italic" fill={C.textTertiary} fontFamily={fontSerif}>centres</text>
              <text x="240" y="125" textAnchor="middle" fontSize="9" fontStyle="italic" fill={C.textTertiary} fontFamily={fontSerif}>computed</text>
            </g>

            <g>
              <text x="320" y="95" textAnchor="middle" fontSize="18" fill={C.obtuse} fontFamily={fontSerif}>⤳</text>
              <text x="320" y="115" textAnchor="middle" fontSize="9" fontStyle="italic" fill={C.obtuse} fontFamily={fontSerif}>slip</text>

              <rect x="340" y="40" width="120" height="100" rx="4"
                fill={C.obtuse} fillOpacity="0.10" stroke={C.obtuse} strokeWidth="1" />
              <text x="400" y="62" textAnchor="middle" fontSize="12" fontStyle="italic" fill={C.obtuse} fontFamily={fontSerif}>L2</text>

              <p style={{ margin: 0, fontSize: '0.82rem' }}>
                non-centralised coordination · the round table
              </p>
            </div>

            <div>
              <p style={{ color: C.text, fontStyle: 'italic', margin: '0 0 4px' }}>mathematics</p>
              <p style={{ margin: 0, fontSize: '0.82rem' }}>
                structures reflected in lived experience
              </p>
            </div>
            <div>
              <p style={{ color: C.text, fontStyle: 'italic', margin: '0 0 4px' }}>social science</p>
              <p style={{ margin: 0, fontSize: '0.82rem' }}>
                geometry of relation, recursion across scales
              </p>
            </div>
            <div>
              <p style={{ color: C.text, fontStyle: 'italic', margin: '0 0 4px' }}>AI</p>
              <p style={{ margin: 0, fontSize: '0.82rem' }}>
                recognising the psychosocial state of the human it talks to
              </p>
            </div>
          </div>
          <p style={{
            fontSize: '1rem', color: C.text, lineHeight: 1.7,
            maxWidth: 620, margin: '0 auto', fontStyle: 'italic',
          }}>
            Each part of this arc expands into its own detailed volume.<br />
            The volumes hold experiments, recognition pauses, situated readings.<br />
            The core deck is the compass.
          </p>
        </SlideBase>
      ),

    ];

    function CoreDeck() {
      const [current, setCurrent] = useState(0);
      const total = slides.length;

      const groups = [
        { name: 'open',           start: 0,  end: 0,  color: C.accent },
        { name: 'foundations',    start: 1,  end: 2,  color: C.acute },
        { name: 'triangle',       start: 3,  end: 4,  color: C.right },
        { name: 'n · euler',      start: 5,  end: 6,  color: C.blue },
        { name: 'layers',         start: 7,  end: 8,  color: C.obtuse },
        { name: 'abc',            start: 9,  end: 10, color: C.teal },
        { name: 'catch-22',       start: 11, end: 12, color: C.obtuse },
        { name: 'lattice',        start: 13, end: 14, color: C.accent },
        { name: 'recursion',      start: 15, end: 16, color: C.acute },
        { name: 'reflexive',      start: 17, end: 18, color: C.right },
        { name: 'close',          start: 19, end: 19, color: C.text },
      ];

      useEffect(() => {
        const handleKey = (e) => {
          if (e.key === 'ArrowRight' || e.key === ' ') {
            setCurrent(c => Math.min(c + 1, total - 1));
          } else if (e.key === 'ArrowLeft') {
            setCurrent(c => Math.max(c - 1, 0));
          }
        };
        window.addEventListener('keydown', handleKey);
        return () => window.removeEventListener('keydown', handleKey);
      }, [total]);

      const Slide = slides[current];

      return (
        <div style={{
          backgroundColor: C.bg,
          minHeight: '100vh',
          position: 'relative',
          fontFamily: fontSerif,
        }}>
          <div style={{
            position: 'fixed', top: 20, left: '50%', transform: 'translateX(-50%)',
            display: 'flex', gap: 18, alignItems: 'flex-start',
            zIndex: 10,
          }}>
            {groups.map((g) => {
              const isCurrentGroup = current >= g.start && current <= g.end;
              return (
                <div key={g.name} style={{
                  display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 5,
                }}>
                  <div style={{
                    fontSize: 9,
                    color: isCurrentGroup ? g.color : C.textTertiary,
                    fontStyle: 'italic',
                    opacity: isCurrentGroup ? 1 : 0.45,
                    letterSpacing: '0.12em',
                    textTransform: 'uppercase',
                    transition: 'all 0.3s',
                    whiteSpace: 'nowrap',
                    fontFamily: fontSerif,
                  }}>
                    {g.name}
                  </div>
                  <div style={{ display: 'flex', gap: 4 }}>
                    {Array.from({ length: g.end - g.start + 1 }).map((_, i) => {
                      const slideIdx = g.start + i;
                      const isCurrentSlide = slideIdx === current;
                      const isPast = slideIdx < current;
                      return (
                        <div
                          key={slideIdx}
                          onClick={() => setCurrent(slideIdx)}
                          style={{
                            width: isCurrentSlide ? 16 : 5,
                            height: 4,
                            borderRadius: 2,
                            backgroundColor: isCurrentSlide
                              ? g.color
                              : isPast ? g.color : C.border,
                            opacity: isCurrentSlide ? 1 : (isPast ? 0.5 : 0.4),
                            cursor: 'pointer',
                            transition: 'all 0.3s',
                          }}
                          title={`Slide ${slideIdx + 1}`}
                        />
                      );
                    })}
                  </div>
                </div>
              );
            })}
          </div>

          <Slide />

          <div style={{
            position: 'fixed', bottom: 28, left: '50%', transform: 'translateX(-50%)',
            display: 'flex', gap: 14, alignItems: 'center', zIndex: 10,
          }}>
            <button
              onClick={() => setCurrent(c => Math.max(c - 1, 0))}
              disabled={current === 0}
              style={{
                border: `1px solid ${C.border}`,
                backgroundColor: 'transparent',
                color: current === 0 ? C.border : C.textSecondary,
                padding: '6px 14px', fontSize: 13, fontFamily: fontSerif,
                fontStyle: 'italic', borderRadius: 3,
                cursor: current === 0 ? 'default' : 'pointer',
                transition: 'all 0.2s',
              }}
            >
              ←
            </button>
            <span style={{
              fontSize: 11, fontStyle: 'italic',
              color: C.textTertiary, fontFamily: fontSerif,
              minWidth: 60, textAlign: 'center',
            }}>
              {current + 1} / {total}
            </span>
            <button
              onClick={() => setCurrent(c => Math.min(c + 1, total - 1))}
              disabled={current === total - 1}
              style={{
                border: `1px solid ${C.border}`,
                backgroundColor: 'transparent',
                color: current === total - 1 ? C.border : C.textSecondary,
                padding: '6px 14px', fontSize: 13, fontFamily: fontSerif,
                fontStyle: 'italic', borderRadius: 3,
                cursor: current === total - 1 ? 'default' : 'pointer',
                transition: 'all 0.2s',
              }}
            >
              →
            </button>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<CoreDeck />);
  </script>
</body>
</html>
