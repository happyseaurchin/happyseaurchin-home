<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pscale Editor — MindFlow</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <header>
      <h1>Pscale Editor</h1>
      <span class="subtitle">multi-block file · see &amp; fine-tune</span>
      <div class="header-actions">
        <button id="btn-new" title="Start a new empty file">new file</button>
        <label class="file-upload" title="Load a JSON file of { id: block, ... }">
          load file
          <input type="file" id="file-input" accept=".json,application/json">
        </label>
        <button id="btn-save" title="Download the current file">save file</button>
        <button id="btn-theme" title="Toggle theme">◐</button>
      </div>
    </header>

    <aside id="block-list">
      <div class="block-list-header">
        <span>Blocks</span>
        <button id="btn-new-block" title="Add a new block to the shelf">+ new</button>
      </div>
      <div id="block-list-items"></div>
      <div class="block-list-footer">
        <input id="filename-input" type="text" placeholder="blocks.json" spellcheck="false">
      </div>
    </aside>

    <main id="viewer">
      <div class="view-bar">
        <div class="view-tabs">
          <button class="tab active" data-view="doc">document</button>
          <button class="tab" data-view="col">columns</button>
          <button class="tab" data-view="dir">dir</button>
        </div>
        <div class="view-controls" data-for="doc">
          <button id="btn-toggle-md">show markdown</button>
          <button id="btn-copy-md">copy md</button>
        </div>
        <div class="view-controls" data-for="dir" hidden>
          <span class="walk-label">subtree of</span>
          <span id="dir-scope" class="dir-breadcrumb"></span>
        </div>
        <div class="view-controls" data-for="col" hidden>
          <span class="walk-label">walk</span>
          <button class="walk-btn active" data-walk="free">free</button>
          <button class="walk-btn" data-walk="spindle">spindle</button>
          <button class="walk-btn" data-walk="ring">ring</button>
          <button class="walk-btn" data-walk="disc">disc</button>
          <button class="walk-btn" data-walk="point">point</button>
          <button class="walk-btn" data-walk="star">star</button>
          <button id="btn-reset-path" title="Clear the walked path">reset</button>
        </div>
      </div>
      <div class="slice-bar">
        <span class="walk-label">slices</span>
        <button id="btn-save-slice" title="Save current view+walk+path as a slice for this block">+ save</button>
        <div id="slice-chips" class="slice-chips"></div>
        <span class="slice-hint" id="slice-hint"></span>
      </div>
      <div id="view-body"></div>
    </main>

    <footer id="status-bar">
      <span id="status-block">—</span>
      <span id="status-addr"></span>
      <span style="flex:1"></span>
      <span id="status-hint">Double-click a column cell to edit · click <span style="color:var(--star)">→ jump</span> to follow a block ref</span>
    </footer>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
