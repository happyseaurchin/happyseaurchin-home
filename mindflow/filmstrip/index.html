<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Filmstrip Viewer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <!-- Top bar -->
    <header id="top-bar">
      <div class="bar-left">
        <span class="title">Filmstrip</span>
        <span id="ws-status" class="ws-indicator"></span>
      </div>
      <div class="bar-center">
        <button class="view-tab active" data-view="c-loop">C-loop</button>
        <button class="view-tab" data-view="b-loop">B-loop</button>
        <button class="view-tab" data-view="a-loop">A-loop</button>
        <span class="divider">|</span>
        <button class="panel-toggle active" id="toggle-input">Input</button>
        <button class="panel-toggle active" id="toggle-output">Output</button>
      </div>
      <div class="bar-right">
        <button class="panel-toggle" id="toggle-raw">Raw JSON</button>
        <label class="upload-btn">
          Upload
          <input type="file" id="file-upload" multiple accept=".json" hidden>
        </label>
      </div>
    </header>

    <!-- Frame list sidebar -->
    <aside id="frame-list">
      <div id="frame-list-inner">
        <div class="empty-state">Drop .json files here or click Upload</div>
      </div>
    </aside>

    <!-- Main content -->
    <main id="main-content">
      <!-- C-loop view -->
      <div id="c-view" class="view-panel active">
        <div id="c-input" class="c-half">
          <div class="c-label">Context Window (input)</div>
          <div id="c-sections"></div>
        </div>
        <div id="c-output" class="c-half">
          <div class="c-label">LLM Output</div>
          <div id="c-output-text"></div>
          <div id="c-tools"></div>
        </div>
      </div>

      <!-- B-loop view -->
      <div id="b-view" class="view-panel">
        <div id="b-list" class="b-sidebar"></div>
        <div id="b-detail" class="b-main">
          <div class="empty-state">Select a B-loop round</div>
        </div>
      </div>

      <!-- A-loop view -->
      <div id="a-view" class="view-panel">
        <div id="a-blocks"></div>
      </div>

      <!-- Empty state -->
      <div id="empty-view" class="view-panel active">
        <div class="empty-state large">
          Drop filmstrip .json files here<br>
          <span class="dim">or click Upload in the top bar</span>
        </div>
      </div>
    </main>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
