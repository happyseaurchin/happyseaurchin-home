<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zand Filmstrip — MindFlow</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <header>
      <h1>Zand Filmstrip</h1>
      <span class="subtitle">agent wakes · gamma · edits · currents</span>
      <div class="header-actions">
        <label class="file-upload" title="Load one or more filmstrip JSON frames">
          load frames
          <input type="file" id="file-input" accept=".json,application/json" multiple>
        </label>
        <button id="btn-clear" title="Clear all loaded frames">clear</button>
        <button id="btn-theme" title="Toggle theme">◐</button>
      </div>
    </header>

    <aside id="block-list">
      <div class="block-list-header">
        <span>Frames</span>
      </div>
      <div id="block-list-items"></div>
    </aside>

    <main id="viewer">
      <div id="view-body"></div>
    </main>

    <footer id="status-bar">
      <span id="status-block">—</span>
      <span id="status-addr"></span>
      <span style="flex:1"></span>
      <span id="status-hint">Drop a filmstrip JSON anywhere · or use load frames</span>
    </footer>
  </div>

  <script type="module" src="app.js?v=2026-06-01a"></script>
</body>
</html>
