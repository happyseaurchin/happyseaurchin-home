<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>happyseaurchin</title>
  <meta name="description" content="The wisdom of not knowing. Projects exploring AI, consciousness, and the structure of meaning.">
  <link rel="icon" href="/assets/torus.png" type="image/png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }

    body {
      font-family: 'Cormorant Garamond', serif;
      -webkit-font-smoothing: antialiased;
      background: #080e18;
    }

    /* ── panels ── */
    .split {
      position: relative;
      width: 100%;
      height: 100%;
    }

    .panel {
      position: absolute;
      top: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      text-decoration: none;
      overflow: hidden;
      cursor: pointer;
    }

    /* ── organic (top-left triangle) ── */
    .panel--organic {
      clip-path: polygon(0 0, 100% 0, 0 100%);
      z-index: 2;
      background: #f0ebe4;
      color: #2a2520;
    }

    /* ── virtual (bottom-right) ── */
    .panel--virtual {
      clip-path: polygon(100% 0, 100% 100%, 0 100%);
      z-index: 1;
      background: #080e18;
      color: #e0f0ff;
    }

    .organic-video {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: 65% 70%;
      z-index: 0;
    }

    .panel--organic .overlay {
      position: absolute;
      inset: 0;
      background: rgba(240, 235, 228, 0.55);
      z-index: 1;
      transition: background 0.5s;
    }

    .panel--organic:hover .overlay {
      background: rgba(240, 235, 228, 0.4);
    }

    .panel--virtual::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 50% 45%, rgba(14,135,240,0.1) 0%, transparent 60%);
      z-index: 1;
    }

    .torus-bg {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      margin: auto;
      width: 55%;
      max-width: 500px;
      height: auto;
      transform: scale(1);
      opacity: 0.35;
      filter: brightness(1.2) drop-shadow(0 0 15px rgba(14,135,240,0.05));
      z-index: 0;
      transition: transform 1.2s ease-out, opacity 0.8s, filter 1.2s ease-out;
    }

    .panel--virtual:hover .torus-bg {
      transform: scale(2);
      opacity: 0.65;
      filter: brightness(1.6) drop-shadow(0 0 60px rgba(14,135,240,0.35));
    }

    /* ── panel content ── */
    .panel-content {
      position: absolute;
      z-index: 3;
      padding: 2rem;
      transition: transform 0.4s ease;
    }

    .panel:hover .panel-content {
      transform: scale(1.05);
    }

    /* organic label — midway left */
    .panel--organic .panel-content {
      top: 50%;
      left: 13%;
      transform: translateY(-50%);
      text-align: left;
    }

    /* virtual label — midway right */
    .panel--virtual .panel-content {
      top: 50%;
      right: 13%;
      transform: translateY(-50%);
      text-align: right;
    }

    .panel h2 {
      font-weight: 600;
      font-size: 2.6rem;
      letter-spacing: 0.04em;
      margin-bottom: 0.3rem;
    }

    .panel .sub {
      font-weight: 500;
      font-style: italic;
      font-size: 1.2rem;
    }

    .panel .hint {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-top: 1.5rem;
      opacity: 0;
      transition: opacity 0.3s;
    }

    .panel:hover .hint { opacity: 0.6; }

    .panel--organic h2 { color: #000; }
    .panel--organic .sub { color: #222; }

    .panel--virtual h2 { color: #fff; }
    .panel--virtual .sub { color: #ddd; }

    /* ── diagonal divider line ── */
    .diagonal-line {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 10;
      pointer-events: none;
    }

    .diagonal-line line {
      stroke: rgba(128, 128, 128, 0.2);
      stroke-width: 1;
    }

    /* ── centre title ── */
    .centre-title {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 20;
      text-align: center;
      pointer-events: none;
    }

    .centre-title h1 {
      font-family: 'JetBrains Mono', monospace;
      font-weight: 400;
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(180, 180, 180, 0.35);
    }

    /* ── responsive ── */
    @media (max-width: 640px) {
      /* horizontal split on mobile instead of diagonal */
      .panel--organic {
        clip-path: polygon(0 0, 100% 0, 100% 45%, 0 55%);
      }
      .panel--virtual {
        clip-path: polygon(0 55%, 100% 45%, 100% 100%, 0 100%);
      }
      .panel--organic .panel-content {
        top: 15%;
        left: 50%;
        right: auto;
        transform: translateX(-50%);
        text-align: center;
      }
      .panel--virtual .panel-content {
        top: auto;
        bottom: 15%;
        left: 50%;
        right: auto;
        transform: translateX(-50%);
        text-align: center;
      }

      .panel h2 { font-size: 2rem; }
      .panel .sub { font-size: 1rem; }

      .diagonal-line line {
        x1: 0; y1: 55%;
        x2: 100%; y2: 45%;
      }
    }
  </style>
</head>
<body>

  <div class="split">

    <!-- organic — video background -->
    <a href="/real-organic-human" class="panel panel--organic">
      <video class="organic-video" autoplay muted loop playsinline>
        <source src="/assets/head-tattoo.mp4" type="video/mp4">
      </video>
      <div class="overlay"></div>
      <div class="panel-content">
        <h2>organic</h2>
        <p class="sub">human timeline</p>
        <p class="hint">&rarr; present</p>
      </div>
    </a>

    <!-- virtual — torus background -->
    <a href="/virtual-ai-agents" class="panel panel--virtual">
      <img src="/assets/torus.png" alt="" class="torus-bg">
      <div class="panel-content">
        <h2>virtual</h2>
        <p class="sub">ai projects</p>
        <p class="hint">enter &rarr;</p>
      </div>
    </a>

    <!-- diagonal line -->
    <svg class="diagonal-line" viewBox="0 0 100 100" preserveAspectRatio="none">
      <line x1="100" y1="0" x2="0" y2="100" />
    </svg>

    <!-- centre label -->
    <div class="centre-title">
      <h1>happyseaurchin</h1>
    </div>

  </div>

</body>
</html>
